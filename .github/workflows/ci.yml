name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install poetry deps
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --with dev
      - name: Run backend smoke tests
        env:
          QUEUE_SERVICE_NAME: noop
          TRANSCRIPTION_QUEUE_NAME: dummy
          TRANSCRIPTION_DEADLETTER_QUEUE_NAME: dummy
          LLM_QUEUE_NAME: dummy
          LLM_DEADLETTER_QUEUE_NAME: dummy
          SENTRY_DSN: http://public@example.com/1
        run: |
          poetry run pytest tests/test_health.py tests/test_export_handler_service.py tests/test_cost_guard.py tests/test_security_headers.py

  frontend:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install npm deps
        run: |
          cd frontend
          npm ci
      - name: Lint
        run: |
          cd frontend
          npm run lint -- --no-cache
      - name: Build
        env:
          NEXT_PUBLIC_BACKEND_HOST: http://localhost:8080
        run: |
          cd frontend
          npm run build -- --no-lint

  terraform-plan:
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Region guard
        run: ./infra/ci/ensure_uk_region.sh uksouth
      - name: Terraform fmt & validate
        run: |
          cd infra/terraform
          terraform fmt -check
          terraform validate
