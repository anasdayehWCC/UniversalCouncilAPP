name: Config Validate

on:
  pull_request:
    paths:
      - "config/**.yml"
      - "config/**.yaml"
      - "config/**.json"
      - "common/config/**"
      - "scripts/validate_configs.py"
      - "tests/test_config_all.py"
  push:
    branches: [main]
    paths:
      - "config/**"
      - "common/config/**"
      - "scripts/validate_configs.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minute-main
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pyyaml
      - name: Validate configs
        run: python scripts/validate_configs.py
