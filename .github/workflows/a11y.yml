name: Accessibility Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'universal-app/src/**'

jobs:
  a11y-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run A11y Audit
        run: pnpm --filter universal-app audit:a11y
      - name: Run Premium UI Audit
        if: always()
        continue-on-error: true
        run: pnpm --filter universal-app audit:premium-ui
