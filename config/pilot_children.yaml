organisation: "Westminster"
service_domain: "Children"
version: "1.0.0"
defaultLocale: "en-GB"
templates:
  - home_visit
  - strategy_discussion
  - lac_review
sharepoint_library_path: "Shared Documents/Children/Visits/2025/"
lexicon:
  - "WCC"
  - "Kensington"
  - "Chelsea"
planner:
  plan_id: "<planner-plan-id>"
  bucket_id: "<planner-bucket-id>"
roles:
  - social_worker
  - manager
modules:
  - id: transcription
    enabled: true
    label: "Capture & Transcribe"
    icon: "mic"
    departments:
      - "Children"
  - id: minutes
    enabled: true
    label: "Minutes"
    icon: "file-text"
    departments:
      - "Children"
retentionDaysDefault: 365
