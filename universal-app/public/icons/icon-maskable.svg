<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004B65;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7CAE22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C8A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Full background for maskable (safe zone: 80% center) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg-gradient)"/>
  
  <!-- Document icon base - centered in safe zone -->
  <rect x="160" y="130" width="150" height="200" rx="10" fill="white" opacity="0.95"/>
  
  <!-- Document lines -->
  <rect x="185" y="170" width="100" height="10" rx="3" fill="#004B65" opacity="0.3"/>
  <rect x="185" y="195" width="80" height="10" rx="3" fill="#004B65" opacity="0.3"/>
  <rect x="185" y="220" width="90" height="10" rx="3" fill="#004B65" opacity="0.3"/>
  <rect x="185" y="245" width="70" height="10" rx="3" fill="#004B65" opacity="0.3"/>
  <rect x="185" y="270" width="85" height="10" rx="3" fill="#004B65" opacity="0.3"/>
  
  <!-- Checkmark circle -->
  <circle cx="330" cy="320" r="65" fill="url(#accent-gradient)"/>
  
  <!-- Checkmark -->
  <path d="M298 320 L318 340 L362 296" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
