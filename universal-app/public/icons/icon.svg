<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004B65;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003347;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7CAE22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C8A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-gradient)"/>
  
  <!-- Document icon base -->
  <rect x="140" y="100" width="180" height="240" rx="12" fill="white" opacity="0.95"/>
  
  <!-- Document lines -->
  <rect x="170" y="150" width="120" height="12" rx="4" fill="#004B65" opacity="0.3"/>
  <rect x="170" y="180" width="100" height="12" rx="4" fill="#004B65" opacity="0.3"/>
  <rect x="170" y="210" width="110" height="12" rx="4" fill="#004B65" opacity="0.3"/>
  <rect x="170" y="240" width="90" height="12" rx="4" fill="#004B65" opacity="0.3"/>
  <rect x="170" y="270" width="105" height="12" rx="4" fill="#004B65" opacity="0.3"/>
  
  <!-- Checkmark circle -->
  <circle cx="340" cy="340" r="80" fill="url(#accent-gradient)"/>
  
  <!-- Checkmark -->
  <path d="M300 340 L325 365 L380 310" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Sound waves (representing recording/audio) -->
  <path d="M380 170 Q395 200 380 230" stroke="#7CAE22" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M400 150 Q425 200 400 250" stroke="#7CAE22" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M420 130 Q455 200 420 270" stroke="#7CAE22" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.4"/>
</svg>
